# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  authentication:
    require_login: "You must be logged in to access that page."
    already_logged_in: "You are already logged in."

  registrations:
    welcome: "Welcome, %{username}! Your account has been created."
    captcha_failed: "Please complete the CAPTCHA verification."

  worlds:
    created: "World created."
    updated: "World updated."
    destroyed: "World deleted."

  characters:
    created: "Character created."
    updated: "Character updated."
    destroyed: "Character deleted."

  scenes:
    created: "Scene created."
    updated: "Scene updated."
    destroyed: "Scene deleted."

  events:
    started: "The player is deciding what to do next."
    adjudicated: "Rolling the chosen tables and narrating the outcome."
    invalid_tables: "Some roll tables were incomplete. Please give each table at least one result row."
    unavailable: "That action isn't available for this scene right now."

  sessions:
    signed_in: "Signed in successfully."
    signed_out: "Signed out."
    invalid_credentials: "Invalid username or password."
    captcha_failed: "Please complete the CAPTCHA verification."

  activerecord:
    errors:
      models:
        user:
          attributes:
            username:
              invalid_characters: "may only contain letters, numbers, and underscores"
