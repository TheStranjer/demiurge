# PostgreSQL. Versions 9.3 and up are supported.
#
#   Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DEMIURGE_PG_HOST") %>
  port: <%= ENV.fetch("DEMIURGE_PG_PORT") %>
  username: <%= ENV.fetch("DEMIURGE_PG_USERNAME") %>
  password: <%= ENV.fetch("DEMIURGE_PG_PASSWORD") %>

development:
  <<: *default
  database: <%= ENV.fetch("DEMIURGE_PG_DATABASE") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= "#{ENV.fetch("DEMIURGE_PG_DATABASE")}_test" %>

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DEMIURGE_PG_DATABASE") %>
  cache:
    <<: *default
    database: <%= "#{ENV.fetch("DEMIURGE_PG_DATABASE")}_cache" %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= "#{ENV.fetch("DEMIURGE_PG_DATABASE")}_queue" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= "#{ENV.fetch("DEMIURGE_PG_DATABASE")}_cable" %>
    migrations_paths: db/cable_migrate
